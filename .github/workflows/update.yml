name: Atualizar dados do monitor
on:
  schedule:
    - cron: '30 9 * * 1-5'   # 06:30 BRT (09:30 UTC), seg-sex
  workflow_dispatch: {}       # botão "Run workflow" manual
permissions:
  contents: write
jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - name: Testes do motor
        run: python pipeline/test_analyze.py
      - name: Rodar pipeline
        env:
          FINNHUB_KEY: ${{ secrets.FINNHUB_KEY }}
        run: python pipeline/run.py
      - name: Commitar dados
        run: |
          git config user.name "monitor-bot"
          git config user.email "bot@users.noreply.github.com"
          git add docs/data.json docs/history.json data/history.jsonl
          git diff --cached --quiet || git commit -m "dados $(date -u +%F)"
          git push
